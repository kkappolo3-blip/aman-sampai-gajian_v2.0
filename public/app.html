<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Canon Budget</title>
<meta name="description" content="Canon Budget — Perencana anggaran keluarga premium." />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/favicon.png" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --gold:#b8902a; --gold-soft:#c9a84c; --gold-deep:#8a6a1f;
    --bg:#f6efe1; --bg-2:#ede2c8;
    --surface:#fffaf0; --surface-2:#fcf4e2;
    --ink:#2a2418; --ink-soft:#5b4f37;
    --line:rgba(184,144,42,0.25);
    --line-soft:rgba(90,75,40,0.10);
  }
  html,body{background:var(--bg); color:var(--ink); font-family:'Inter','Segoe UI',sans-serif;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(212,175,55,0.20), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(184,144,42,0.18), transparent 60%),
      radial-gradient(800px 500px at 50% 110%, rgba(212,175,55,0.10), transparent 60%),
      linear-gradient(180deg,#faf3e2,#f4ead2 50%,#efe2c0);
    min-height:100vh;
  }
  .serif{font-family:'Cormorant Garamond','Playfair Display',Georgia,serif;}
  .glass{
    background: linear-gradient(180deg, rgba(255,250,240,0.92), rgba(252,244,226,0.92));
    border:1px solid var(--line);
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 50px -22px rgba(90,70,20,0.30), inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .gold-text{
    background: linear-gradient(180deg,#b8902a,#8a6a1f 60%,#6b4f10);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .btn-gold{
    background: linear-gradient(180deg,#e9c971,#b8902a);
    color:#2a1d05; border:1px solid #8a6a1f;
    box-shadow: 0 8px 20px -8px rgba(184,144,42,0.55), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .btn-gold:hover{filter:brightness(1.05);}
  .btn-ghost{background:rgba(184,144,42,0.10); border:1px solid var(--line); color:var(--gold-deep);}
  .btn-ghost:hover{background:rgba(184,144,42,0.18);}
  .input{
    background:rgba(255,255,255,0.85); border:1px solid var(--line);
    color:var(--ink); border-radius:10px; padding:10px 12px; outline:none; width:100%;
    transition: all .15s;
  }
  .input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,0.18);}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px;
    background:rgba(184,144,42,0.12); border:1px solid var(--line); font-size:11px; color:var(--gold-deep);}
  .scroll-y{overflow-y:auto;}
  .scroll-y::-webkit-scrollbar{width:6px;}
  .scroll-y::-webkit-scrollbar-track{background:transparent;}
  .scroll-y::-webkit-scrollbar-thumb{background:rgba(184,144,42,0.30); border-radius:10px;}
  .divider{height:1px; background:linear-gradient(90deg, transparent, var(--line), transparent);}
  .cal-cell{aspect-ratio:1/1; border:1px solid var(--line-soft); border-radius:10px; padding:6px; font-size:11px; position:relative; background:rgba(255,255,255,0.6);}
  .cal-cell.has-bill{background:linear-gradient(180deg, rgba(212,175,55,0.30), rgba(212,175,55,0.10)); border-color:rgba(184,144,42,0.55); box-shadow:inset 0 0 18px rgba(212,175,55,0.18);}
  .cal-cell.has-income{background:linear-gradient(180deg, rgba(120,170,90,0.25), rgba(120,170,90,0.08)); border-color:rgba(120,170,90,0.5);}
  .cal-cell.today{outline:2px solid var(--gold);}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#2a2418; color:#f5e7a8; padding:12px 20px; border-radius:999px; border:1px solid var(--gold); box-shadow:0 20px 50px rgba(0,0,0,.3); z-index:1000; font-size:13px;}
  .sidebar{position:sticky; top:0; height:100vh; width:300px; flex-shrink:0;
    background: linear-gradient(180deg, rgba(255,250,240,0.95), rgba(243,232,200,0.95));
    border-right:1px solid var(--line); backdrop-filter: blur(10px);
    display:flex; flex-direction:column;}
  .nav-item{display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; cursor:pointer; font-size:13px; color:var(--ink-soft); transition:all .15s;}
  .nav-item:hover{background:rgba(184,144,42,0.10); color:var(--ink);}
  .nav-item.active{background:linear-gradient(180deg, rgba(233,201,113,0.55), rgba(184,144,42,0.35)); color:#2a1d05; font-weight:700; border:1px solid var(--line);}
  .nav-item .icn{font-size:16px; width:20px; text-align:center;}
  .sticky-header{position:sticky; top:0; z-index:30;
    background: linear-gradient(180deg, rgba(246,239,225,0.96), rgba(246,239,225,0.88));
    backdrop-filter: blur(12px);
    border-bottom:1px solid var(--line);
  }
  @media(max-width:900px){
    .sidebar{position:fixed; left:0; top:0; z-index:50; transform:translateX(-100%); transition:transform .25s; width:280px;}
    .sidebar.open{transform:translateX(0);}
    .backdrop{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Cell } = Recharts;

const fmt = (n) => new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);
const fmtShort = (n) => {
  const s = n<0?'-':''; n=Math.abs(n);
  if(n>=1e9) return s+(n/1e9).toFixed(1)+'M';
  if(n>=1e6) return s+(n/1e6).toFixed(1)+'jt';
  if(n>=1e3) return s+(n/1e3).toFixed(0)+'k';
  return s+String(n);
};
const dateOnly = (d)=>{const x=new Date(d); x.setHours(0,0,0,0); return x;};
const addDays = (d,n)=>{const x=new Date(d); x.setDate(x.getDate()+n); return x;};
const daysBetween = (a,b)=>Math.max(0, Math.round((dateOnly(b)-dateOnly(a))/86400000)+1);
const iso = (d)=> new Date(d).toISOString().slice(0,10);
const idDate = (d)=> new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
const idDateShort = (d)=> new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
const uid = ()=> Math.random().toString(36).slice(2,10);
const ls = {
  get:(k,fb)=>{try{return JSON.parse(localStorage.getItem('cb_'+k))??fb}catch{return fb}},
  set:(k,v)=>localStorage.setItem('cb_'+k, JSON.stringify(v))
};

function useToast(){
  const [msg,setMsg]=useState('');
  const t=useRef();
  const show=(m)=>{ setMsg(m); clearTimeout(t.current); t.current=setTimeout(()=>setMsg(''),2400); };
  const node = msg ? <div className="toast">{msg}</div> : null;
  return [show,node];
}

// ============ MAIN APP ============
function App(){
  const [toast, ToastNode] = useToast();
  const [page, setPage] = useState(()=> ls.get('page','dashboard'));
  const [navOpen, setNavOpen] = useState(false);

  useEffect(()=>ls.set('page', page),[page]);

  const today = new Date();
  const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const lastOfMonth = new Date(today.getFullYear(), today.getMonth()+1, 0);

  const [incomes, setIncomes] = useState(()=> {
    const saved = ls.get('incomes', null);
    if(saved && saved.length){
      // migrate old shape if needed
      return saved.map(i=>({
        id: i.id || uid(),
        name: i.name || 'Sumber',
        amount: Number(i.amount)||0,
        receiveDate: i.receiveDate || (i.start || iso(firstOfMonth)),
        start: i.start || iso(firstOfMonth),
        end: i.end || iso(lastOfMonth),
      }));
    }
    return [
      { id: uid(), name:'Gaji', amount:1000000, receiveDate:iso(firstOfMonth), start:iso(firstOfMonth), end:iso(new Date(today.getFullYear(), today.getMonth(), 15)) },
      { id: uid(), name:'Tunjangan', amount:3000000, receiveDate:iso(new Date(today.getFullYear(), today.getMonth(), 16)), start:iso(new Date(today.getFullYear(), today.getMonth(), 16)), end:iso(lastOfMonth) }
    ];
  });

  const [billTemplates, setBillTemplates] = useState(()=> ls.get('billTemplates', []));
  const [bills, setBills] = useState(()=> ls.get('activeBills', []));
  const [history, setHistory] = useState(()=> ls.get('history', []));
  const [editingId, setEditingId] = useState(null);

  useEffect(()=>ls.set('incomes', incomes),[incomes]);
  useEffect(()=>ls.set('billTemplates', billTemplates),[billTemplates]);
  useEffect(()=>ls.set('activeBills', bills),[bills]);
  useEffect(()=>ls.set('history', history),[history]);

  const addIncomeSource = ()=> setIncomes([...incomes, {
    id: uid(), name:'Sumber Baru', amount:0,
    receiveDate: iso(today),
    start: iso(today), end: iso(addDays(today,15))
  }]);
  const removeIncome = (id)=> setIncomes(incomes.filter(i=>i.id!==id));
  const updIncome = (id, patch)=> setIncomes(incomes.map(i=> i.id===id ? {...i, ...patch} : i));

  const blankBill = ()=>({ id:uid(), name:'', amount:0, day:1, freq:0, _draft:true });
  const addBill = (data)=> setBills([{...blankBill(), ...(data||{}), id:uid(), _draft: !data}, ...bills]);
  const updBill = (id, patch)=> setBills(bills.map(b=> b.id===id ? {...b, ...patch} : b));
  const removeBill = (id)=> setBills(bills.filter(b=>b.id!==id));
  const saveBill = (id)=>{
    const b = bills.find(x=>x.id===id);
    if(!b.name || b.amount<=0){ toast('Lengkapi nama & jumlah dulu'); return; }
    updBill(id,{_draft:false});
    setEditingId(null);
    const next = billTemplates.filter(t=> t.name.toLowerCase()!==b.name.toLowerCase());
    next.unshift({ id:uid(), name:b.name, amount:b.amount, day:b.day, freq:b.freq });
    setBillTemplates(next);
    toast(`💾 "${b.name}" disimpan ke template`);
  };
  const useTemplate = (t)=>{ addBill({name:t.name, amount:t.amount, day:t.day, freq:t.freq, _draft:false}); toast('Template ditambahkan'); };
  const removeTemplate = (id)=> setBillTemplates(billTemplates.filter(t=>t.id!==id));

  // ============ SIMULATION (GABUNG TOTAL only) ============
  // Logic: total semua pemasukan - total semua tagihan = sisa bersih
  // Sisa bersih dibagi rata seluruh hari, dibulatkan ke puluh ribu (Rp 10.000)
  // Prioritas: tagihan dibayar dulu, baru sisa = harian
  const sim = useMemo(()=>{
    const valid = incomes.filter(i=> Number(i.amount)>0 && i.start && i.end);
    if(!valid.length) return null;
    const start = new Date(Math.min(...valid.map(i=>+new Date(i.start))));
    const end   = new Date(Math.max(...valid.map(i=>+new Date(i.end))));
    const N = daysBetween(start,end);
    if(N<=0) return null;

    const perDay = Array.from({length:N},(_,i)=>({
      date: addDays(start,i), bills:[], dailyAllow:0, billTotal:0, total:0,
      incomeIn:0,
    }));

    // expand bills to days within range
    let totalBills = 0;
    bills.filter(b=>!b._draft && b.amount>0).forEach(b=>{
      let firstIdx = -1;
      for(let i=0;i<N;i++){
        if(perDay[i].date.getDate() === Number(b.day)){ firstIdx=i; break; }
      }
      if(firstIdx===-1) return;
      const step = Number(b.freq)||0;
      if(step===0){ perDay[firstIdx].bills.push(b); totalBills += Number(b.amount); }
      else{
        for(let i=firstIdx;i<N;i+=step){ perDay[i].bills.push(b); totalBills += Number(b.amount); }
      }
    });
    perDay.forEach(d=> d.billTotal = d.bills.reduce((s,b)=>s+Number(b.amount),0));

    const totalIncome = valid.reduce((s,i)=>s+Number(i.amount||0),0);

    // mark income inflow on receive date
    valid.forEach(inc=>{
      const recISO = inc.receiveDate;
      const idx = perDay.findIndex(d=> iso(d.date)===recISO);
      if(idx>=0) perDay[idx].incomeIn += Number(inc.amount);
    });

    // PRIORITAS: bayar tagihan dulu, sisa bersih dibagi rata
    const netAfterBills = totalIncome - totalBills;
    // Bulatkan ke puluh ribu (kelipatan 10.000)
    const dailyRaw = N>0 ? netAfterBills / N : 0;
    const daily = Math.max(0, Math.floor(dailyRaw / 10000) * 10000);

    perDay.forEach(d=>{ d.dailyAllow = daily; d.total = daily + d.billTotal; });

    const sisaAkhir = netAfterBills - daily * N; // sisa karena pembulatan
    const hardestDay = perDay.reduce((a,b)=> b.total>a.total?b:a, perDay[0]);
    const biggestBill = bills.filter(b=>!b._draft).reduce((a,b)=> Number(b.amount)>(a?Number(a.amount):0)?b:a, null);
    const billRatio = totalIncome>0 ? totalBills/totalIncome : 0;
    const billDays = perDay.filter(d=>d.bills.length>0).length;
    const heaviestWeek = (()=>{
      let best={i:0,total:0};
      for(let i=0;i+6<N;i++){
        const t=perDay.slice(i,i+7).reduce((s,d)=>s+d.total,0);
        if(t>best.total) best={i,total:t};
      }
      return { start: perDay[best.i]?.date, end: perDay[Math.min(best.i+6,N-1)]?.date, total: best.total };
    })();

    // talangan: cek saldo berjalan untuk deteksi defisit (income belum cair tapi sudah keluar)
    let bal = 0, minBal = 0, minBalDay = null;
    perDay.forEach(d=>{
      bal += d.incomeIn;
      bal -= d.dailyAllow + d.billTotal;
      d.balance = bal;
      if(bal < minBal){ minBal = bal; minBalDay = d.date; }
    });
    const talangan = minBal < 0 ? Math.ceil(-minBal/10000)*10000 : 0;

    return { start, end, N, totalIncome, totalBills, netAfterBills, daily, sisaAkhir, perDay, hardestDay, biggestBill, billRatio, billDays, heaviestWeek, talangan, talanganDay: minBalDay };
  },[incomes, bills]);

  // ---------- text report ----------
  const report = useMemo(()=>{
    if(!sim) return '';
    const lines = [];
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('  CANON BUDGET — LAPORAN ANGGARAN');
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(`📅 ${idDate(sim.start)}  →  ${idDate(sim.end)}  (${sim.N} hari)`);
    lines.push('');
    lines.push('💎 SUMBER PEMASUKAN');
    incomes.forEach(i=>{
      if(!(Number(i.amount)>0)) return;
      lines.push(`• ${i.name} — cair ${idDate(i.receiveDate)} — ${fmt(i.amount)}`);
      lines.push(`  rentang: ${idDateShort(i.start)} → ${idDateShort(i.end)}`);
    });
    lines.push('');
    lines.push('📊 RINGKASAN');
    lines.push(`Total Pemasukan  : ${fmt(sim.totalIncome)}`);
    lines.push(`Total Tagihan    : ${fmt(sim.totalBills)}  (${(sim.billRatio*100).toFixed(1)}%)`);
    lines.push(`Sisa setelah Tagihan: ${fmt(sim.netAfterBills)}`);
    lines.push(`Jatah Harian (puluh ribu): ${fmt(sim.daily)}`);
    lines.push(`Sisa Pembulatan  : ${fmt(sim.sisaAkhir)}`);
    if(sim.talangan>0){
      lines.push('');
      lines.push('⚠️ DANA TALANGAN');
      lines.push(`Butuh ${fmt(sim.talangan)} sebagai buffer awal.`);
      lines.push(`(saldo terendah ${idDate(sim.talanganDay)})`);
    }
    lines.push('');
    lines.push('🔥 INSIGHT');
    lines.push(`Hari terberat   : ${idDate(sim.hardestDay.date)} (${fmt(sim.hardestDay.total)})`);
    if(sim.biggestBill) lines.push(`Tagihan terbesar: ${sim.biggestBill.name} ${fmt(sim.biggestBill.amount)}`);
    lines.push(`Rasio tagihan   : ${(sim.billRatio*100).toFixed(1)}% ${sim.billRatio>0.7?'⚠️ TINGGI':sim.billRatio>0.5?'⚡ Sedang':'✅ Sehat'}`);
    lines.push(`Hari ada tagihan: ${sim.billDays} dari ${sim.N} hari`);
    if(sim.heaviestWeek.start) lines.push(`Minggu terberat : ${idDateShort(sim.heaviestWeek.start)} → ${idDateShort(sim.heaviestWeek.end)} (${fmt(sim.heaviestWeek.total)})`);
    lines.push('');
    lines.push('📆 RINCIAN HARIAN');
    sim.perDay.forEach(d=>{
      const ds = new Date(d.date).toLocaleDateString('id-ID',{weekday:'short',day:'2-digit',month:'2-digit'});
      let line = `${ds} │ Harian ${fmt(d.dailyAllow)}`;
      if(d.incomeIn>0) line += ` │ +Income ${fmt(d.incomeIn)}`;
      if(d.bills.length){
        line += ` │ Tagihan ${fmt(d.billTotal)}`;
        d.bills.forEach(b=> line += `\n         └ ${b.name} ${fmt(b.amount)}`);
      }
      lines.push(line);
    });
    lines.push('');
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push('Dibuat oleh Canon Budget ✨');
    return lines.join('\n');
  },[sim, incomes]);

  const copyReport = ()=>{
    if(!report) return toast('Belum ada simulasi');
    navigator.clipboard.writeText(report).then(()=>toast('📋 Laporan disalin'));
  };
  const shareWA = ()=>{
    if(!report) return toast('Belum ada simulasi');
    const url = 'https://wa.me/?text='+encodeURIComponent(report);
    window.open(url,'_blank');
  };
  const exportCSV = ()=>{
    if(!sim) return toast('Belum ada simulasi');
    const rows = [['Tanggal','Hari','Jatah Harian','Income Masuk','Total Tagihan','Detail Tagihan','Saldo']];
    sim.perDay.forEach(d=>{
      rows.push([
        iso(d.date),
        new Date(d.date).toLocaleDateString('id-ID',{weekday:'long'}),
        d.dailyAllow, d.incomeIn||0, d.billTotal,
        d.bills.map(b=>`${b.name}:${b.amount}`).join('; '),
        d.balance||0
      ]);
    });
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `canon-budget-${iso(sim.start)}_${iso(sim.end)}.csv`;
    a.click();
    toast('📂 CSV diunduh');
  };
  const saveSimulation = ()=>{
    if(!sim) return toast('Belum ada simulasi');
    const name = prompt('Nama simulasi:', 'Simulasi '+new Date().toLocaleDateString('id-ID'));
    if(!name) return;
    const item = { id:uid(), name, date:new Date().toISOString(), report, snapshot:{ incomes, bills }, summary:{ totalIncome:sim.totalIncome, totalBills:sim.totalBills, daily:sim.daily, N:sim.N } };
    setHistory([item, ...history]);
    toast('💾 Simulasi tersimpan');
  };
  const loadSim = (h)=>{
    if(!confirm('Muat ulang simulasi ini? Data saat ini akan diganti.')) return;
    setIncomes(h.snapshot.incomes); setBills(h.snapshot.bills);
    setPage('simulasi');
    toast('Dimuat: '+h.name);
  };
  const removeSim = (id)=> setHistory(history.filter(h=>h.id!==id));
  const resetAll = ()=>{
    if(!confirm('Hapus SEMUA data?')) return;
    localStorage.clear(); location.reload();
  };

  const navItems = [
    {id:'dashboard', label:'Dashboard', icn:'◆'},
    {id:'simulasi', label:'Simulasi', icn:'✎'},
    {id:'kalender', label:'Kalender', icn:'▦'},
    {id:'laporan', label:'Pratinjau Laporan', icn:'≡'},
    {id:'riwayat', label:'Riwayat Simulasi', icn:'⟳'},
  ];
  const navTo = (id)=>{ setPage(id); setNavOpen(false); };

  // swipe-left to close (mobile)
  const touchRef = useRef({x:0, y:0, active:false});
  const onTouchStart = (e)=>{ const t=e.touches[0]; touchRef.current={x:t.clientX, y:t.clientY, active:true}; };
  const onTouchMove = (e)=>{
    if(!touchRef.current.active) return;
    const t=e.touches[0];
    const dx = t.clientX - touchRef.current.x;
    const dy = Math.abs(t.clientY - touchRef.current.y);
    if(dx < -50 && dy < 60){ setNavOpen(false); touchRef.current.active=false; }
  };
  const onTouchEnd = ()=>{ touchRef.current.active=false; };

  return (
    <div className="flex min-h-screen">
      {navOpen && <div className="backdrop" onClick={()=>setNavOpen(false)} />}
      <aside
        className={`sidebar ${navOpen?'open':''}`}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div className="p-4 border-b" style={{borderColor:'var(--line)'}}>
          <div className="flex items-center gap-3">
            <img src="/logo.png" alt="Canon Budget" className="w-12 h-12 object-contain drop-shadow" />
            <div>
              <h1 className="serif text-2xl font-bold gold-text leading-tight">Canon Budget</h1>
              <p className="text-[10px]" style={{color:'var(--ink-soft)'}}>Wealth · Discipline · Clarity</p>
            </div>
          </div>
        </div>

        <div className="p-3 space-y-1 border-b" style={{borderColor:'var(--line)'}}>
          {navItems.map(n=>(
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>navTo(n.id)}>

// ============ SUMMARY STRIP (Ringkasan + Insight di header sticky) ============
function SummaryStrip({sim}){
  if(!sim) return (
    <div className="text-xs italic text-center py-2" style={{color:'var(--ink-soft)'}}>
      Belum ada simulasi — buka menu <strong>Simulasi</strong> untuk mulai.
    </div>
  );
  const items = [
    {l:'Pemasukan', v:fmt(sim.totalIncome), c:'#3d7a3d'},
    {l:'Tagihan', v:fmt(sim.totalBills), c:'#a83229'},
    {l:'Harian', v:fmt(sim.daily), c:'#3a6dc4'},
    {l:'Sisa', v:fmt(sim.sisaAkhir), c:'#8a6a1f'},
  ];
  return (
    <div className="space-y-2">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        {items.map(it=>(
          <div key={it.l} className="rounded-lg px-3 py-2 bg-white/70 border" style={{borderColor:'var(--line-soft)'}}>
            <p className="text-[9px] uppercase tracking-widest" style={{color:'var(--ink-soft)'}}>{it.l}</p>
            <p className="serif text-base font-bold" style={{color:it.c}}>{it.v}</p>
          </div>
        ))}
      </div>
      <div className="flex flex-wrap gap-2 text-[10px]">
        <span className="chip">📅 {sim.N} hari</span>
        <span className="chip" style={{color: sim.billRatio>0.7?'#a83229':sim.billRatio>0.5?'#8a6a1f':'#3d7a3d'}}>
          Rasio Tagihan {(sim.billRatio*100).toFixed(0)}% {sim.billRatio>0.7?'⚠️':sim.billRatio>0.5?'⚡':'✅'}
        </span>
        <span className="chip">🔥 Hari Terberat {idDateShort(sim.hardestDay.date)}</span>
        {sim.biggestBill && <span className="chip">💸 {sim.biggestBill.name} {fmtShort(sim.biggestBill.amount)}</span>}
        {sim.talangan>0 && <span className="chip" style={{color:'#a83229', background:'rgba(220,90,80,0.12)'}}>⚠️ Talangan {fmtShort(sim.talangan)}</span>}
      </div>
    </div>
  );
}

// ============ INSIGHT PINTAR (block) ============
function InsightPintar({sim}){
  if(!sim) return null;
  const tips = [];
  if(sim.billRatio > 0.7) tips.push({i:'⚠️', t:`Rasio tagihan ${(sim.billRatio*100).toFixed(0)}% — terlalu tinggi. Kurangi tagihan tetap atau cari tambahan pemasukan.`});
  else if(sim.billRatio > 0.5) tips.push({i:'⚡', t:`Rasio tagihan ${(sim.billRatio*100).toFixed(0)}% — sedang. Hati-hati pada hari terberat.`});
  else tips.push({i:'✅', t:`Rasio tagihan ${(sim.billRatio*100).toFixed(0)}% — sehat. Pertahankan disiplin pengeluaran.`});

  if(sim.daily < 20000) tips.push({i:'💡', t:`Jatah harian ${fmt(sim.daily)} cukup ketat. Pertimbangkan menambah pemasukan atau menahan tagihan opsional.`});
  if(sim.daily >= 50000) tips.push({i:'💎', t:`Jatah harian ${fmt(sim.daily)} cukup leluasa. Sisihkan minimal 10% untuk tabungan.`});

  if(sim.talangan > 0) tips.push({i:'🛟', t:`Saldo bisa minus pada ${idDate(sim.talanganDay)}. Siapkan dana talangan ${fmt(sim.talangan)} di awal periode.`});

  if(sim.biggestBill) tips.push({i:'💸', t:`Tagihan terbesar: ${sim.biggestBill.name} ${fmt(sim.biggestBill.amount)} (${((sim.biggestBill.amount/sim.totalIncome)*100).toFixed(1)}% pemasukan).`});

  tips.push({i:'📊', t:`Hari terberat ${idDate(sim.hardestDay.date)} dengan total pengeluaran ${fmt(sim.hardestDay.total)}.`});
  if(sim.heaviestWeek.start) tips.push({i:'📆', t:`Minggu terberat: ${idDateShort(sim.heaviestWeek.start)} → ${idDateShort(sim.heaviestWeek.end)} total ${fmt(sim.heaviestWeek.total)}.`});
  tips.push({i:'🗓️', t:`${sim.billDays} dari ${sim.N} hari ada tagihan (${((sim.billDays/sim.N)*100).toFixed(0)}%).`});
  if(sim.sisaAkhir > 0) tips.push({i:'🪙', t:`Sisa pembulatan ${fmt(sim.sisaAkhir)} — bisa dijadikan tabungan otomatis.`});

  return (
    <section className="glass rounded-2xl p-5">
      <h3 className="serif text-2xl gold-text mb-3">Insight Pintar</h3>
      <div className="space-y-2">
        {tips.map((t,i)=>(
          <div key={i} className="flex gap-3 p-3 rounded-xl bg-white/60 border" style={{borderColor:'var(--line-soft)'}}>
            <span className="text-lg">{t.i}</span>
            <p className="text-sm" style={{color:'var(--ink)'}}>{t.t}</p>
          </div>
        ))}
      </div>
    </section>
  );
}

function KalenderPage({sim}){
  if(!sim) return <EmptyState msg="Buat simulasi dulu di menu Simulasi." />;
  const today = dateOnly(new Date());
  // group days by month
  const months = useMemo(()=>{
    const map = new Map();
    sim.perDay.forEach(d=>{
      const k = `${d.date.getFullYear()}-${d.date.getMonth()}`;
      if(!map.has(k)) map.set(k,{year:d.date.getFullYear(), month:d.date.getMonth(), days:[]});
      map.get(k).days.push(d);
    });
    return [...map.values()];
  },[sim]);
  const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  return (
    <div className="space-y-5">
      <section className="glass rounded-2xl p-5">
        <h2 className="serif text-3xl gold-text mb-2">Kalender</h2>
        <p className="text-sm" style={{color:'var(--ink-soft)'}}>Visual jatuh tempo tagihan & tanggal cair pemasukan.</p>
        <div className="flex flex-wrap gap-3 mt-3 text-[11px]">
          <span className="chip" style={{background:'rgba(212,175,55,0.30)'}}>● Ada tagihan</span>
          <span className="chip" style={{background:'rgba(120,170,90,0.30)', color:'#3d7a3d'}}>● Income masuk</span>
        </div>
      </section>
      {months.map(m=>{
        const first = new Date(m.year, m.month, 1);
        const offset = first.getDay();
        const total = new Date(m.year, m.month+1, 0).getDate();
        const cells = [];
        for(let i=0;i<offset;i++) cells.push(null);
        for(let d=1; d<=total; d++){
          const date = new Date(m.year, m.month, d);
          const found = m.days.find(x=> x.date.getDate()===d);
          cells.push({date, info:found});
        }
        return (
          <section key={`${m.year}-${m.month}`} className="glass rounded-2xl p-5">
            <p className="serif text-2xl gold-text mb-3">{first.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</p>
            <div className="grid grid-cols-7 gap-1 mb-1">
              {dayNames.map(n=><div key={n} className="text-[11px] text-center font-bold" style={{color:'var(--ink-soft)'}}>{n}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-2">
              {cells.map((c,i)=>{
                if(!c) return <div key={i}/>;
                const isToday = +dateOnly(c.date) === +today;
                const has = c.info && c.info.bills.length>0;
                const inc = c.info && c.info.incomeIn>0;
                let cls = 'cal-cell';
                if(has) cls += ' has-bill';
                else if(inc) cls += ' has-income';
                if(isToday) cls += ' today';
                return (
                  <div key={i} className={cls} title={c.info ? [
                    inc?`+ Income ${fmt(c.info.incomeIn)}`:'',
                    has?c.info.bills.map(b=>`${b.name} ${fmt(b.amount)}`).join('\n'):''
                  ].filter(Boolean).join('\n') : ''}>
                    <div className="font-bold">{c.date.getDate()}</div>
                    {inc && <div className="text-[9px] mt-0.5 font-bold" style={{color:'#3d7a3d'}}>+{fmtShort(c.info.incomeIn)}</div>}
                    {has && <div className="text-[9px]" style={{color:'#8a6a1f', fontWeight:600}}>{fmtShort(c.info.billTotal)}</div>}
                  </div>
                );
              })}
            </div>
          </section>
        );
      })}
    </div>
  );
}

// ============ LAPORAN ============
function LaporanPage({sim, report, shareWA, copyReport, exportCSV, saveSimulation}){
  if(!sim) return <EmptyState msg="Buat simulasi dulu di menu Simulasi." />;
  return (
    <div className="space-y-5">
      <section className="glass rounded-2xl p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <h2 className="serif text-3xl gold-text">Pratinjau Laporan</h2>
          <div className="flex gap-2 flex-wrap">
            <button onClick={shareWA} className="btn-gold text-xs px-3 py-2 rounded-lg font-bold">📱 WhatsApp</button>
            <button onClick={copyReport} className="btn-ghost text-xs px-3 py-2 rounded-lg">📋 Copy</button>
            <button onClick={exportCSV} className="btn-ghost text-xs px-3 py-2 rounded-lg">📂 CSV</button>
            <button onClick={saveSimulation} className="btn-ghost text-xs px-3 py-2 rounded-lg">💾 Save</button>
          </div>
        </div>
      </section>
      <section className="glass rounded-2xl p-5">
        <div className="scroll-y bg-white/70 rounded-xl p-5 border" style={{maxHeight:'70vh', borderColor:'var(--line-soft)'}}>
          <pre className="text-xs whitespace-pre-wrap leading-relaxed font-mono" style={{color:'var(--ink)'}}>{report}</pre>
        </div>
      </section>
    </div>
  );
}

// ============ RIWAYAT ============
function RiwayatPage({history, loadSim, removeSim, toast}){
  return (
    <div className="space-y-5">
      <section className="glass rounded-2xl p-5">
        <h2 className="serif text-3xl gold-text mb-2">Riwayat Simulasi</h2>
        <p className="text-sm" style={{color:'var(--ink-soft)'}}>Klik <strong>Muat</strong> untuk pakai ulang.</p>
      </section>
      <section className="glass rounded-2xl p-5">
        {history.length===0 && <p className="text-sm italic text-center py-8" style={{color:'var(--ink-soft)'}}>Belum ada simulasi tersimpan.</p>}
        <div className="space-y-3">
          {history.map(h=>(
            <div key={h.id} className="flex items-center justify-between gap-2 p-4 rounded-xl bg-white/70 border" style={{borderColor:'var(--line-soft)'}}>
              <div className="min-w-0 flex-1">
                <p className="font-bold truncate">{h.name}</p>
                <p className="text-[11px]" style={{color:'var(--ink-soft)'}}>
                  {new Date(h.date).toLocaleString('id-ID')}
                  {h.summary && ` · ${h.summary.N} hari · Harian ${fmt(h.summary.daily)}`}
                </p>
              </div>
              <div className="flex gap-1">
                <button onClick={()=>{navigator.clipboard.writeText(h.report); toast('📋 Disalin');}} className="btn-ghost px-3 py-2 rounded-lg text-xs">📋</button>
                <button onClick={()=>loadSim(h)} className="btn-gold px-3 py-2 rounded-lg text-xs font-bold">↺ Muat</button>
                <button onClick={()=>removeSim(h.id)} className="btn-ghost px-3 py-2 rounded-lg text-xs">✕</button>
              </div>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}

function EmptyState({msg}){
  return (
    <div className="glass rounded-2xl p-12 text-center">
      <div className="serif text-2xl gold-text mb-2">Belum ada data</div>
      <p className="text-sm" style={{color:'var(--ink-soft)'}}>{msg}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
